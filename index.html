<script>
  // Surface any script error on screen instead of failing silently to black
  window.addEventListener("error", (e) => {
    const b = document.getElementById("boot");
    if (b) {
      b.innerHTML = '<div style="color:#ef4444;max-width:85%;text-align:center;font-size:12px;line-height:1.6;">LOAD ERROR:<br>' +
        (e.message || "unknown error") + '<br><br><span style="color:#556;font-size:10px;">' +
        (e.filename ? e.filename.split("/").pop() + ":" + e.lineno : "") + '</span></div>';
    }
  });

  window.addEventListener("unhandledrejection", (e) => {
    const b = document.getElementById("boot");
    if (b) {
      b.innerHTML = '<div style="color:#ef4444;max-width:85%;text-align:center;font-size:12px;line-height:1.6;">LOAD ERROR:<br>' +
        (e.reason && e.reason.message ? e.reason.message : String(e.reason)) + '</div>';
    }
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }

  // Safety net: if nothing has mounted after 8s, show a clear message instead of a silent black screen
  setTimeout(() => {
    const root = document.getElementById("root");
    const boot = document.getElementById("boot");
    if (boot && boot.style.display !== "none" && root && root.children.length === 0) {
      boot.innerHTML = '<div style="color:#f59e0b;max-width:85%;text-align:center;font-size:12px;line-height:1.6;">Still loading…<br>if this stays, check your connection or reload.</div>';
    }
  }, 8000);
</script>

// LOCAL SAVE — persists day, tab, checkmarks, smoke-free count, and
// tip positions across sessions using localStorage. Wrapped in
// try/catch so the app still works fine (just without persistence)
// in any environment where storage is unavailable or blocked.

const SAVE_KEY = "bc60_progress_v1";
const loadSave = () => {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
};
const writeSave = (data) => {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch { /* storage unavailable — ignore */ }
};

// ─────────────────────────────────────────────────────────────────
// DAILY TIMETABLE BUILDER — merges physical blocks + a generated
// deep-work coding schedule + meals/breaks/review into one real,
// minute-accurate wake-to-sleep clock for the day. Nobody executes
// "10 hours of coding" as a floating number — they execute a clock.
// ─────────────────────────────────────────────────────────────────
const t2m = (t) => { const [h,m] = t.split(":").map(Number); return h*60+m; };
const m2t = (mins) => {
  const mm = ((mins % 1440) + 1440) % 1440;
  const h = Math.floor(mm/60), m = mm%60;
  const period = h < 12 ? "AM" : "PM";
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return `${h12}:${String(m).padStart(2,"0")} ${period}`;
};
const durToMin = (dur) => parseInt(dur,10) || 0;

function buildDayTimetable(physDay, bd) {
  const isRest = /rest/i.test(physDay.focus) || /rest/i.test(physDay.title);
  const items = [];
  physDay.blocks.forEach(b => {
    const start = t2m(b.time);
    items.push({start, end:start+durToMin(b.dur), type:b.type, name:b.name, desc:b.desc});
  });
  let cursor = items[items.length-1].end;

  if (!isRest && bd) {
    cursor += 10;
    items.push({start:cursor, end:cursor+30, type:"meal", name:"Shower + Breakfast", desc:"Protein-forward meal. Write today's #1 coding objective on a sticky note before opening the laptop."});
    cursor += 30;

    let remaining = Math.round(bd.hours * 60);
    let sinceLunch = 0, sinceDinner = 0, lunchDone = false, dinnerDone = false, block = 1;
    while (remaining > 0) {
      const chunk = Math.min(120, remaining);
      const hoursLabel = (chunk/60).toFixed(chunk%60===0?0:1);
      items.push({start:cursor, end:cursor+chunk, type:"code", name:`Deep Work Block ${block}`, desc:`${hoursLabel}h focused build — today's concepts, exercises, and mini project. Phone in another room.`});
      cursor += chunk; remaining -= chunk; sinceLunch += chunk; sinceDinner += chunk; block++;
      if (remaining <= 0) break;
      if (!lunchDone && sinceLunch >= 200) {
        items.push({start:cursor, end:cursor+40, type:"meal", name:"Lunch + Walk", desc:"Eat away from the screen. 10 min outside after — resets focus for the next block."});
        cursor += 40; lunchDone = true; sinceLunch = 0;
      } else if (!dinnerDone && sinceDinner >= 300) {
        items.push({start:cursor, end:cursor+40, type:"meal", name:"Dinner Break", desc:"Step away fully. No screens at the table."});
        cursor += 40; dinnerDone = true; sinceDinner = 0;
      } else {
        items.push({start:cursor, end:cursor+10, type:"brk", name:"Short Break", desc:"Stand, stretch, water, look at something far away. No phone scroll."});
        cursor += 10;
      }
    }
    items.push({start:cursor, end:cursor+20, type:"review", name:"Log & Push to GitHub", desc:"Commit today's code. Mark concepts / exercises / mini-project / challenge / outcome as done in the CODING tab."});
    cursor += 20;
  } else {
    cursor += 15;
    items.push({start:cursor, end:cursor+30, type:"meal", name:"Slow Breakfast", desc:"No screens for the first hour awake. Let the nervous system actually downshift."});
    cursor += 30;
    items.push({start:cursor, end:cursor+45, type:"review", name:"Weekly Review", desc:"Log training numbers, outreach numbers, and income for the week. Plan next week's #1 priority."});
    cursor += 45;
    items.push({start:cursor, end:cursor+480, type:"free", name:"Free / Family / Admin Time", desc:"Deliberate rest is part of the program, not a break from it. Errands, people you care about, nothing structured."});
    cursor += 480;
  }

  items.push({start:cursor, end:cursor+10, type:"mind", name:"Evening Mind Check-In", desc:"Weakness Mirror prompt + smoke-free tally, out loud, honest. Two minutes."});
  cursor += 10;
  const bedtime = isRest ? Math.max(cursor+10, t2m("22:00")) : t2m("22:00");
  items.push({start:bedtime, end:bedtime+15, type:"sleep", name:"Lights Out Prep", desc:"Phone charging outside the bedroom. Clothes for tomorrow laid out. Sleep is a training block, not a gap between them."});

  return { items, isRest, wake:items[0].start, sleep:bedtime+15 };
}

// ─────────────────────────────────────────────────────────────────
// FEEL LAYER — small, self-contained helpers that make the app feel
// tactile and alive: haptics on every meaningful tap, and a lightweight
// canvas confetti burst for the big dopamine moments (level up, perfect
// day, achievement unlock). No external libraries — everything here is
// hand-rolled so the app keeps working fully offline as a PWA.
// ─────────────────────────────────────────────────────────────────
function haptic(pattern = 8) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch {}
}

function ConfettiBurst({ trigger }) {
  const canvasRef = React.useRef(null);
  useEffect(() => {
    if (!trigger) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = (canvas.width = window.innerWidth);
    const H = (canvas.height = window.innerHeight);
    const colors = ["#00ff88", "#00d4ff", "#a855f7", "#dc2626", "#d4af37", "#ffffff"];
    const particles = Array.from({ length: 80 }, () => ({
      x: W / 2 + (Math.random() - 0.5) * 100,
      y: H * 0.32,
      vx: (Math.random() - 0.5) * 12,
      vy: Math.random() * -12 - 4,
      size: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 20,
    }));
    const start = performance.now();
    let raf;
    const tick = (now) => {
      const elapsed = now - start;
      ctx.clearRect(0, 0, W, H);
      const life = Math.max(0, 1 - elapsed / 1500);
      particles.forEach((p) => {
        p.vy += 0.35;
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rot * Math.PI) / 180);
        ctx.globalAlpha = life;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
      });
      if (elapsed < 1500) raf = requestAnimationFrame(tick);
      else ctx.clearRect(0, 0, W, H);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [trigger]);
  if (!trigger) return null;
  return <canvas ref={canvasRef} style={{ position: "fixed", inset: 0, zIndex: 400, pointerEvents: "none" }} />;
}

    const total = pTotal + cChecks.length + mTotal + 2 + gFieldsAll.length;
    const done  = pDone + cDone + mDone + lDone + gDoneAll;
    return total > 0 ? Math.round((done/total)*100) : 0;
  };

  const nowDateStr = () => new Date().toISOString().slice(0,10);

  const grantXP = (key, source) => {

              })}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,marginTop:10,fontSize:8,color:"#556"}}>
              <span>LESS</span>
              {[0,1,2,3,4].map(l=><div key={l} style={{width:10,height:10,borderRadius:2,background:l===0?"#14141e":l===1?"#0d3a2a":l===2?"#0f6b45":l===3?"#12a35e":"#00ff88"}}/>)}
              <span>MORE</span>
            </div>
          </div>

          {/* Daily reminder notification */}
          <div style={C.chartCard}>
            <div style={C.chartLabel}>DAILY REMINDER</div>
            <div style={C.notifRow}>
              <div style={{fontSize:11,color:"#ccd"}}>Notify me every day at</div>
              <input
                type="time"
                value={reminderTime}
                onChange={(e)=>setReminderTime(e.target.value)}
                style={C.notifTimeInput}
              />
            </div>
            <div style={C.notifRow}>
              <div style={{fontSize:11,color:"#ccd"}}>Enabled</div>
              <div
                style={C.notifSwitch(reminderOn)}
                onClick={()=>{
                  if (!reminderOn && typeof Notification!=="undefined" && Notification.permission==="default") {
                    Notification.requestPermission().then(p=>{ setNotifPermission(p); if(p==="granted") setReminderOn(true); });
                  } else {
                    setReminderOn(r=>!r);
                  }
                }}
              >
                <div style={C.notifKnob(reminderOn)}/>
              </div>
            </div>
            {notifPermission==="denied" && (
              <div style={{fontSize:10,color:"#dc2626",marginTop:6}}>Notifications are blocked in your browser settings. Enable them to use reminders.</div>
            )}
            {notifPermission==="unsupported" && (
              <div style={{fontSize:10,color:"#556",marginTop:6}}>This browser doesn't support notifications, but the app will still track everything.</div>
            )}
            <div style={{fontSize:9,color:"#445",marginTop:8,lineHeight:1.6}}>Reminders fire only while this app is open in a tab — keep it running in the background for it to trigger.</div>
          </div>
        </div>
      )}
      </div>

      <ConfettiBurst trigger={confettiTrigger} />

      {/* ─── FIXED BOTTOM NAV — thumb-reach, Instagram-style ─── */}
      <div style={C.bottomNavWrap}>
        <div style={C.bottomNav}>
          {[
            ["timetable","🗓️","Today",wc],
            ["physical","💪","Train","#dc2626"],
            ["code","⚡","Code",wc],
            ["hustle","💼","Hustle","#00d4ff"],
            ["discipline","🛡️","Mind","#a855f7"],
            ["stats","📊","Stats","#00ff88"],
          ].map(([k,icon,label,c])=>(
            <button key={k} className="gc-press" style={C.bottomNavBtn} onClick={()=>handleTabSelect(k)}>
              {tab===k && <span style={C.bottomNavDot(c)}/>}
              <span style={C.bottomNavIcon(tab===k)}>{icon}</span>
              <span style={C.bottomNavLabel(tab===k,c)}>{label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

// App mounted successfully — now it's safe to remove the boot splash
const bootEl = document.getElementById("boot");
if (bootEl) bootEl.style.display = "none";
</script>
</body>
</html>
