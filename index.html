<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>30-Day Warrior Bootcamp</title>
<meta name="description" content="30-day physical, mental, and AI-automation coding bootcamp tracker" />

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0a0a0f" />

<!-- iOS / Android install support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Warrior30" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />

<style>
  html, body { margin:0; padding:0; background:#0a0a0f; overscroll-behavior-y: none; }
  #root { min-height: 100vh; }
  /* simple loading splash while React/Babel parse the app */
  #boot {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; background:#0a0a0f; color:#00ff88; font-family:monospace;
    letter-spacing:2px; z-index:9999;
  }
  #boot .sub { color:#7c3aed; font-size:11px; margin-top:8px; }
</style>
</head>
<body>

<div id="boot">
  <div>LOADING WARRIOR30…</div>
  <div class="sub">first load may take a few seconds</div>
</div>
<div id="root"></div>

<!-- React 18 + Babel standalone (runtime JSX compile, no build step needed) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

<script>
  // Surface any script error on screen instead of failing silently to black
  window.addEventListener("error", (e) => {
    const b = document.getElementById("boot");
    if (b) {
      b.innerHTML = '<div style="color:#ef4444;max-width:85%;text-align:center;font-size:12px;line-height:1.6;">LOAD ERROR:<br>' +
        (e.message || "unknown error") + '<br><br><span style="color:#556;font-size:10px;">' +
        (e.filename ? e.filename.split("/").pop() + ":" + e.lineno : "") + '</span></div>';
    }
  });

  window.addEventListener("unhandledrejection", (e) => {
    const b = document.getElementById("boot");
    if (b) {
      b.innerHTML = '<div style="color:#ef4444;max-width:85%;text-align:center;font-size:12px;line-height:1.6;">LOAD ERROR:<br>' +
        (e.reason && e.reason.message ? e.reason.message : String(e.reason)) + '</div>';
    }
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }

  // Safety net: if nothing has mounted after 8s, show a clear message instead of a silent black screen
  setTimeout(() => {
    const root = document.getElementById("root");
    const boot = document.getElementById("boot");
    if (boot && boot.style.display !== "none" && root && root.children.length === 0) {
      boot.innerHTML = '<div style="color:#f59e0b;max-width:85%;text-align:center;font-size:12px;line-height:1.6;">Still loading…<br>if this stays, check your connection or reload.</div>';
    }
  }, 8000);
</script>

<script type="text/babel" data-presets="react" src="app.jsx"></script>

</body>
</html>
